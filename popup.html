<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHAOS</title>
  <style>
    :root {
      --bg-base: oklch(11% 0.01 260);
      --bg-raised: oklch(15% 0.01 260);
      --bg-surface: oklch(19% 0.012 260);
      --bg-hover: oklch(23% 0.012 260);
      --border-subtle: oklch(25% 0.01 260);
      --border-default: oklch(30% 0.012 260);
      --border-focus: oklch(55% 0.14 270);
      --text-primary: oklch(90% 0.01 260);
      --text-secondary: oklch(65% 0.01 260);
      --text-muted: oklch(50% 0.01 260);
      --accent: oklch(55% 0.14 270);
      --accent-hover: oklch(50% 0.16 270);
      --accent-text: oklch(75% 0.1 270);
      --font-sans: 'Instrument Sans', system-ui, -apple-system, sans-serif;
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 120ms;
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --text-xs: 0.6875rem;
      --text-sm: 0.8125rem;
      --text-base: 0.875rem;
      --text-md: 0.9375rem;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg-base: oklch(97% 0.005 260);
        --bg-raised: oklch(93% 0.005 260);
        --bg-surface: oklch(100% 0 0);
        --bg-hover: oklch(90% 0.008 260);
        --border-subtle: oklch(88% 0.005 260);
        --border-default: oklch(82% 0.008 260);
        --border-focus: oklch(55% 0.14 270);
        --text-primary: oklch(20% 0.01 260);
        --text-secondary: oklch(40% 0.01 260);
        --text-muted: oklch(55% 0.01 260);
        --accent: oklch(50% 0.14 270);
        --accent-hover: oklch(45% 0.16 270);
        --accent-text: oklch(40% 0.1 270);
      }
    }

    [data-theme="dark"] {
      --bg-base: oklch(11% 0.01 260);
      --bg-raised: oklch(15% 0.01 260);
      --bg-surface: oklch(19% 0.012 260);
      --bg-hover: oklch(23% 0.012 260);
      --border-subtle: oklch(25% 0.01 260);
      --border-default: oklch(30% 0.012 260);
      --border-focus: oklch(55% 0.14 270);
      --text-primary: oklch(90% 0.01 260);
      --text-secondary: oklch(65% 0.01 260);
      --text-muted: oklch(50% 0.01 260);
      --accent: oklch(55% 0.14 270);
      --accent-hover: oklch(50% 0.16 270);
      --accent-text: oklch(75% 0.1 270);
    }

    [data-theme="light"] {
      --bg-base: oklch(97% 0.005 260);
      --bg-raised: oklch(93% 0.005 260);
      --bg-surface: oklch(100% 0 0);
      --bg-hover: oklch(90% 0.008 260);
      --border-subtle: oklch(88% 0.005 260);
      --border-default: oklch(82% 0.008 260);
      --border-focus: oklch(55% 0.14 270);
      --text-primary: oklch(20% 0.01 260);
      --text-secondary: oklch(40% 0.01 260);
      --text-muted: oklch(55% 0.01 260);
      --accent: oklch(50% 0.14 270);
      --accent-hover: oklch(45% 0.16 270);
      --accent-text: oklch(40% 0.1 270);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      width: 280px;
      background: var(--bg-base);
      color: var(--text-primary);
      padding: var(--sp-4);
      font-size: var(--text-sm);
      -webkit-font-smoothing: antialiased;
    }

    .header {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      margin-bottom: var(--sp-4);
    }

    .header h1 {
      font-size: var(--text-md);
      font-weight: 700;
      color: var(--accent-text);
      letter-spacing: 0.05em;
    }

    .agent-info {
      margin-bottom: var(--sp-4);
    }

    .agent-info .name {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--text-primary);
    }

    .agent-info .role {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .agent-info .none {
      color: var(--text-muted);
      font-style: italic;
    }

    .agent-info .agent-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-1) 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .agent-info .agent-row:last-child {
      border-bottom: none;
    }

    label {
      display: block;
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-bottom: var(--sp-1);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    select {
      width: 100%;
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: var(--sp-2) var(--sp-2);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      outline: none;
      margin-bottom: var(--sp-4);
      min-height: 36px;
      transition: border-color var(--duration-fast) var(--ease-out);
    }

    select:focus {
      border-color: var(--border-focus);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }

    .actions button {
      width: 100%;
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: var(--sp-3);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      min-height: 44px;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .actions button:hover {
      background: var(--bg-hover);
      border-color: var(--border-focus);
    }

    .actions button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .actions .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: oklch(95% 0.01 270);
      text-align: center;
      font-weight: 600;
    }

    .actions .primary:hover {
      background: var(--accent-hover);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>CHAOS</h1>
  </div>

  <div class="agent-info" id="agent-info">
    <div class="none">Loading agents...</div>
  </div>

  <div class="actions">
    <button class="primary" id="btn-open-dashboard">Open CHAOS</button>
  </div>

  <script type="module" src="src/popup.ts"></script>
</body>
</html>
