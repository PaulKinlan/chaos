<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CHAOS</title>
  <style>
    :root {
      /* Tinted neutrals (warm slate) */
      --bg-base: oklch(11% 0.01 260);
      --bg-raised: oklch(15% 0.01 260);
      --bg-surface: oklch(19% 0.012 260);
      --bg-hover: oklch(23% 0.012 260);
      --border-subtle: oklch(25% 0.01 260);
      --border-default: oklch(30% 0.012 260);
      --border-focus: oklch(55% 0.14 270);

      /* Text */
      --text-primary: oklch(90% 0.01 260);
      --text-secondary: oklch(65% 0.01 260);
      --text-muted: oklch(50% 0.01 260);

      /* Accent - a warm indigo instead of generic purple */
      --accent: oklch(55% 0.14 270);
      --accent-hover: oklch(50% 0.16 270);
      --accent-subtle: oklch(25% 0.06 270);
      --accent-text: oklch(75% 0.1 270);

      /* Semantic */
      --success: oklch(60% 0.15 155);
      --success-subtle: oklch(22% 0.04 155);
      --danger: oklch(55% 0.2 25);
      --danger-subtle: oklch(22% 0.04 25);

      /* Spacing (4pt base) */
      --sp-1: 4px;
      --sp-2: 8px;
      --sp-3: 12px;
      --sp-4: 16px;
      --sp-5: 20px;
      --sp-6: 24px;
      --sp-8: 32px;

      /* Type */
      --font-sans: 'Instrument Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
      --text-xs: 0.6875rem;
      --text-sm: 0.8125rem;
      --text-base: 0.875rem;
      --text-md: 0.9375rem;

      /* Transitions */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --duration-fast: 120ms;
      --duration-normal: 200ms;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: var(--text-base);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-3);
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-raised);
      flex-shrink: 0;
    }

    .header h1 {
      font-size: var(--text-md);
      font-weight: 700;
      color: var(--accent-text);
      letter-spacing: 0.05em;
    }

    .header select {
      flex: 1;
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: var(--sp-2) var(--sp-2);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      outline: none;
      transition: border-color var(--duration-fast) var(--ease-out);
    }

    .header select:focus {
      border-color: var(--border-focus);
    }

    .header-actions {
      display: flex;
      gap: var(--sp-1);
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border-default);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: var(--sp-2);
      min-width: 32px;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-base);
      transition: all var(--duration-fast) var(--ease-out);
    }

    .icon-btn:hover {
      color: var(--text-primary);
      border-color: var(--border-focus);
      background: var(--bg-surface);
    }

    .icon-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    /* ── Setup prompt ── */
    .setup-prompt {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--sp-4);
      padding: var(--sp-8) var(--sp-5);
      text-align: center;
      flex: 1;
    }

    .setup-prompt.visible {
      display: flex;
    }

    .setup-prompt p {
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .setup-prompt button {
      background: var(--accent);
      color: oklch(95% 0.01 270);
      border: none;
      border-radius: 6px;
      padding: var(--sp-2) var(--sp-5);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      min-height: 36px;
      transition: background var(--duration-fast) var(--ease-out);
    }

    .setup-prompt button:hover {
      background: var(--accent-hover);
    }

    .setup-prompt button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── Page context bar ── */
    .page-context {
      display: none;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-2) var(--sp-3);
      background: var(--accent-subtle);
      border-bottom: 1px solid oklch(30% 0.06 270);
      font-size: var(--text-xs);
      color: var(--accent-text);
      flex-shrink: 0;
    }

    .page-context.visible {
      display: flex;
    }

    .page-context span {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page-context .dismiss {
      cursor: pointer;
      color: var(--accent-text);
      font-weight: 600;
      font-size: var(--text-base);
      min-width: 24px;
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Messages area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: var(--sp-3);
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }

    .message {
      max-width: 92%;
      padding: var(--sp-3) var(--sp-3);
      border-radius: 10px;
      line-height: 1.55;
      word-wrap: break-word;
      overflow-wrap: break-word;
      font-size: var(--text-sm);
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent-subtle);
      color: oklch(88% 0.04 270);
      border-bottom-right-radius: 3px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--bg-surface);
      color: var(--text-primary);
      border-bottom-left-radius: 3px;
    }

    .message.assistant p {
      margin: 0 0 var(--sp-2) 0;
    }

    .message.assistant p:last-child {
      margin-bottom: 0;
    }

    .message.assistant pre {
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: var(--sp-3);
      overflow-x: auto;
      margin: var(--sp-2) 0;
    }

    .message.assistant code {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
    }

    .message.assistant :not(pre) > code {
      background: var(--bg-hover);
      padding: 2px 5px;
      border-radius: 3px;
      font-size: var(--text-xs);
    }

    .message.assistant ul, .message.assistant ol {
      padding-left: var(--sp-5);
      margin: var(--sp-2) 0;
    }

    .message.assistant blockquote {
      border-left: 3px solid var(--accent);
      padding-left: var(--sp-3);
      margin: var(--sp-2) 0;
      color: var(--text-secondary);
    }

    .message.assistant a {
      color: var(--accent-text);
      text-decoration: underline;
      text-decoration-color: oklch(55% 0.08 270 / 0.4);
      text-underline-offset: 2px;
    }

    .message.assistant a:hover {
      text-decoration-color: var(--accent-text);
    }

    .message.system {
      align-self: center;
      background: none;
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-style: italic;
      padding: var(--sp-1);
    }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      padding: var(--sp-3) var(--sp-3);
      gap: 5px;
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-indicator span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: typingFade 1.4s infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typingFade {
      0%, 60%, 100% { opacity: 0.3; }
      30% { opacity: 1; }
    }

    /* ── Input area ── */
    .input-area {
      display: flex;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-3);
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-raised);
      flex-shrink: 0;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
      display: flex;
      align-items: flex-end;
    }

    .input-area textarea {
      flex: 1;
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      border-radius: 8px;
      padding: var(--sp-2) 36px var(--sp-2) var(--sp-3);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 36px;
      line-height: 1.5;
      transition: border-color var(--duration-fast) var(--ease-out);
    }

    .btn-mic {
      position: absolute;
      right: 4px;
      bottom: 4px;
      background: none !important;
      border: none !important;
      padding: var(--sp-1) 6px !important;
      font-size: 16px !important;
      cursor: pointer;
      color: var(--text-muted);
      border-radius: 4px !important;
      transition: color var(--duration-fast) var(--ease-out);
      min-width: 28px;
      min-height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-mic:hover {
      color: var(--text-primary) !important;
      background: none !important;
    }

    .btn-mic.recording {
      color: var(--danger) !important;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .input-area textarea:focus {
      border-color: var(--border-focus);
    }

    .input-area textarea::placeholder {
      color: var(--text-muted);
    }

    .input-area button {
      background: var(--accent);
      color: oklch(95% 0.01 270);
      border: none;
      border-radius: 8px;
      padding: var(--sp-2) var(--sp-3);
      font-size: var(--text-base);
      cursor: pointer;
      align-self: flex-end;
      min-width: 36px;
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background var(--duration-fast) var(--ease-out);
    }

    .input-area button:hover {
      background: var(--accent-hover);
    }

    .input-area button:disabled {
      background: var(--bg-surface);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .input-area button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── Settings modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: oklch(5% 0.01 260 / 0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--bg-raised);
      border: 1px solid var(--border-default);
      border-radius: 12px;
      padding: var(--sp-5);
      width: 90%;
      max-width: 360px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 {
      font-size: var(--text-md);
      font-weight: 600;
      margin-bottom: var(--sp-4);
      color: var(--text-primary);
    }

    .modal label {
      display: block;
      font-size: var(--text-xs);
      color: var(--text-secondary);
      margin-bottom: var(--sp-1);
      margin-top: var(--sp-3);
      font-weight: 500;
      letter-spacing: 0.01em;
    }

    .modal label:first-of-type {
      margin-top: 0;
    }

    .modal input[type="password"],
    .modal input[type="text"] {
      width: 100%;
      background: var(--bg-base);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: var(--sp-2) var(--sp-3);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      outline: none;
      min-height: 36px;
      transition: border-color var(--duration-fast) var(--ease-out);
    }

    .modal input:focus {
      border-color: var(--border-focus);
    }

    .modal-actions {
      display: flex;
      gap: var(--sp-2);
      margin-top: var(--sp-5);
      justify-content: flex-end;
    }

    .modal-actions button {
      padding: var(--sp-2) var(--sp-4);
      border-radius: 6px;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      border: none;
      min-height: 36px;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .btn-primary {
      background: var(--accent);
      color: oklch(95% 0.01 270);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-primary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .btn-secondary {
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border-default);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    /* ── Create agent modal ── */
    .modal select {
      width: 100%;
      background: var(--bg-base);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: var(--sp-2) var(--sp-3);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      outline: none;
      min-height: 36px;
      transition: border-color var(--duration-fast) var(--ease-out);
    }

    .modal select:focus {
      border-color: var(--border-focus);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-subtle);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-default);
    }

    /* ── Tab bar ── */
    .sp-tabs {
      display: flex;
      height: 36px;
      background: var(--bg-raised);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .sp-tab {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      font-weight: 600;
      cursor: pointer;
      transition: all var(--duration-fast) var(--ease-out);
      padding: 0;
      min-height: 36px;
      letter-spacing: 0.01em;
    }

    .sp-tab:hover {
      color: var(--text-secondary);
      background: var(--bg-surface);
    }

    .sp-tab:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .sp-tab.active {
      color: var(--accent-text);
      border-bottom-color: var(--accent);
    }

    /* ── Panels ── */
    .sp-panel {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .sp-panel.active {
      display: flex;
    }

    /* ── Agents panel ── */
    .sp-agents-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-3) var(--sp-3);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .sp-agents-header span {
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .sp-agents-list {
      flex: 1;
      overflow-y: auto;
      padding: var(--sp-1) 0;
    }

    .sp-agent-card {
      padding: var(--sp-3) var(--sp-3);
      border-bottom: 1px solid var(--border-subtle);
      cursor: pointer;
      transition: background var(--duration-fast) var(--ease-out);
    }

    .sp-agent-card:hover {
      background: var(--bg-surface);
    }

    .sp-agent-card-header {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      font-size: var(--text-sm);
    }

    .sp-agent-card-header .agent-name {
      flex: 1;
      color: var(--text-primary);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sp-badge {
      font-size: 0.625rem;
      padding: 2px var(--sp-2);
      border-radius: 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .sp-badge.role {
      background: var(--accent-subtle);
      color: var(--accent-text);
    }

    .sp-badge.visibility {
      background: var(--success-subtle);
      color: oklch(70% 0.12 155);
    }

    .sp-badge.visibility-private {
      background: oklch(20% 0.01 260);
      color: var(--text-secondary);
    }

    .sp-badge.visibility-open {
      background: oklch(20% 0.04 250);
      color: oklch(70% 0.1 250);
    }

    .sp-agent-detail {
      display: none;
      padding: var(--sp-2) 0 var(--sp-1);
    }

    .sp-agent-detail.open {
      display: block;
    }

    .sp-agent-detail-actions {
      display: flex;
      gap: var(--sp-2);
      margin-bottom: var(--sp-2);
    }

    .sp-agent-detail-actions button {
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      padding: var(--sp-1) var(--sp-3);
      border-radius: 4px;
      border: 1px solid var(--border-default);
      background: var(--bg-surface);
      color: var(--text-secondary);
      cursor: pointer;
      min-height: 28px;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .sp-agent-detail-actions button:hover {
      border-color: var(--border-focus);
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .sp-agent-detail-actions button.danger {
      border-color: oklch(35% 0.08 25);
      color: oklch(70% 0.15 25);
    }

    .sp-agent-detail-actions button.danger:hover {
      background: var(--danger-subtle);
      border-color: var(--danger);
    }

    .sp-agent-visibility-row {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      margin-bottom: var(--sp-2);
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }

    .sp-agent-visibility-row select {
      background: var(--bg-base);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      border-radius: 4px;
      padding: 2px var(--sp-2);
      font-family: var(--font-sans);
      font-size: var(--text-xs);
    }

    .sp-agent-claude-md {
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      padding: var(--sp-2);
      font-size: var(--text-xs);
      line-height: 1.55;
      color: var(--text-secondary);
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* CLAUDE.md editor overlay */
    .sp-editor-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: oklch(5% 0.01 260 / 0.9);
      z-index: 200;
      flex-direction: column;
      padding: var(--sp-3);
    }

    .sp-editor-overlay.visible {
      display: flex;
    }

    .sp-editor-overlay .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-2);
      flex-shrink: 0;
    }

    .sp-editor-overlay .editor-header span {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
    }

    .sp-editor-overlay textarea {
      flex: 1;
      background: var(--bg-base);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      border-radius: 6px;
      padding: var(--sp-3);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      resize: none;
      outline: none;
      line-height: 1.55;
      transition: border-color var(--duration-fast) var(--ease-out);
    }

    .sp-editor-overlay textarea:focus {
      border-color: var(--border-focus);
    }

    .sp-editor-overlay .editor-actions {
      display: flex;
      gap: var(--sp-2);
      justify-content: flex-end;
      margin-top: var(--sp-2);
      flex-shrink: 0;
    }

    /* ── Files panel ── */
    .sp-files-header {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-3) var(--sp-3);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .sp-files-header label {
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--text-secondary);
      flex-shrink: 0;
    }

    .sp-files-header select {
      flex: 1;
      background: var(--bg-surface);
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      border-radius: 4px;
      padding: var(--sp-1) var(--sp-2);
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      outline: none;
      transition: border-color var(--duration-fast) var(--ease-out);
    }

    .sp-file-tree {
      flex: 1;
      overflow-y: auto;
      padding: var(--sp-1) 0;
      font-size: var(--text-xs);
    }

    .sp-file-tree-item {
      display: flex;
      align-items: center;
      padding: var(--sp-1) var(--sp-3);
      cursor: pointer;
      color: var(--text-secondary);
      transition: background var(--duration-fast) var(--ease-out);
      white-space: nowrap;
      min-height: 28px;
    }

    .sp-file-tree-item:hover {
      background: var(--bg-surface);
      color: var(--text-primary);
    }

    .sp-file-tree-item .icon {
      width: 16px;
      text-align: center;
      margin-right: var(--sp-1);
      font-size: var(--text-xs);
      flex-shrink: 0;
    }

    .sp-file-tree-item .name {
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sp-file-tree-item .size {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 0.625rem;
      padding-left: var(--sp-2);
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .sp-file-viewer {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    .sp-file-viewer.visible {
      display: flex;
    }

    .sp-file-viewer-header {
      display: flex;
      align-items: center;
      padding: var(--sp-2) var(--sp-3);
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-raised);
      flex-shrink: 0;
    }

    .sp-file-viewer-header span {
      flex: 1;
      font-size: var(--text-xs);
      color: var(--text-secondary);
      font-family: var(--font-mono);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sp-file-viewer-header button {
      background: none;
      border: 1px solid var(--border-default);
      border-radius: 4px;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 2px var(--sp-2);
      font-family: var(--font-sans);
      font-size: var(--text-xs);
      min-height: 24px;
      transition: all var(--duration-fast) var(--ease-out);
    }

    .sp-file-viewer-header button:hover {
      color: var(--text-primary);
      border-color: var(--border-focus);
    }

    .sp-file-viewer-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--sp-3) var(--sp-3);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      line-height: 1.55;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>CHAOS</h1>
    <select id="agent-select">
      <option value="">Select agent...</option>
    </select>
    <div class="header-actions">
      <button class="icon-btn" id="btn-read-page" title="Read this page">&#128196;</button>
      <button class="icon-btn" id="btn-clear-chat" title="Clear conversation">&#128465;</button>
      <button class="icon-btn" id="btn-new-agent" title="Create agent">+</button>
      <button class="icon-btn" id="btn-settings" title="Settings">&#9881;</button>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="sp-tabs">
    <button class="sp-tab active" data-sp-tab="chat">Chat</button>
    <button class="sp-tab" data-sp-tab="agents">Agents</button>
    <button class="sp-tab" data-sp-tab="files">Files</button>
  </div>

  <!-- Chat panel -->
  <div class="sp-panel active" id="sp-chat">
    <!-- Setup prompt (shown when no API key is configured) -->
    <div class="setup-prompt" id="setup-prompt">
      <p><strong>Welcome to CHAOS</strong></p>
      <p>To get started, add an API key for at least one AI provider.</p>
      <button id="btn-open-settings">Open Settings</button>
    </div>

    <!-- Page context bar -->
    <div class="page-context" id="page-context">
      <span id="page-context-text"></span>
      <span class="dismiss" id="btn-dismiss-context">&times;</span>
    </div>

    <!-- Messages area -->
    <div class="messages" id="messages"></div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typing-indicator">
      <span></span><span></span><span></span>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
        <button id="btn-mic" title="Voice input" class="btn-mic">&#127908;</button>
      </div>
      <button id="btn-send">&#9654;</button>
    </div>
  </div>

  <!-- Agents panel -->
  <div class="sp-panel" id="sp-agents">
    <div class="sp-agents-header">
      <span>Agents</span>
      <button class="icon-btn" id="btn-agents-create" title="Create agent">+</button>
    </div>
    <div class="sp-agents-list" id="sp-agents-list"></div>
  </div>

  <!-- Files panel -->
  <div class="sp-panel" id="sp-files">
    <div class="sp-files-header">
      <label>Agent:</label>
      <select id="sp-files-agent-select">
        <option value="">Select agent...</option>
      </select>
    </div>
    <div class="sp-file-tree" id="sp-file-tree"></div>
    <div class="sp-file-viewer" id="sp-file-viewer">
      <div class="sp-file-viewer-header">
        <span id="sp-file-viewer-path"></span>
        <button id="sp-file-viewer-close">&times;</button>
      </div>
      <div class="sp-file-viewer-content" id="sp-file-viewer-content"></div>
    </div>
  </div>

  <!-- CLAUDE.md editor overlay -->
  <div class="sp-editor-overlay" id="sp-editor-overlay">
    <div class="editor-header">
      <span>Edit CLAUDE.md</span>
    </div>
    <textarea id="sp-editor-textarea"></textarea>
    <div class="editor-actions">
      <button class="btn-secondary" id="sp-editor-cancel">Cancel</button>
      <button class="btn-primary" id="sp-editor-save">Save</button>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <h2>Provider</h2>
      <label for="provider-select">Active AI Provider</label>
      <select id="provider-select" style="width:100%;padding:8px;margin-bottom:12px;background:var(--bg-base);color:var(--text-primary);border:1px solid var(--border-default);border-radius:6px;font-family:var(--font-sans);">
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="google">Google (Gemini)</option>
        <option value="openai">OpenAI</option>
        <option value="openrouter">OpenRouter</option>
      </select>
      <h2>API Keys</h2>
      <label for="key-anthropic">Anthropic</label>
      <input type="password" id="key-anthropic" placeholder="sk-ant-...">
      <label for="key-google">Google (Gemini)</label>
      <input type="password" id="key-google" placeholder="AI...">
      <label for="key-openai">OpenAI</label>
      <input type="password" id="key-openai" placeholder="sk-...">
      <label for="key-openrouter">OpenRouter</label>
      <input type="password" id="key-openrouter" placeholder="sk-or-...">
      <h2 style="margin-top:20px;font-size:var(--text-base);">Browser Permissions</h2>
      <p style="font-size:var(--text-xs);color:var(--text-secondary);margin-bottom:8px;">These permissions are optional. Enable them to unlock more agent capabilities.</p>
      <div id="browser-permissions" style="margin-bottom:12px;"></div>
      <h2 style="margin-top:12px;font-size:var(--text-base);">Tool Permissions</h2>
      <div id="sp-permissions" style="max-height:200px;overflow-y:auto;margin-top:8px;"></div>
      <div class="modal-actions">
        <button class="btn-secondary" id="btn-settings-cancel">Cancel</button>
        <button class="btn-primary" id="btn-settings-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Create agent modal -->
  <div class="modal-overlay" id="create-agent-modal">
    <div class="modal">
      <h2>Create Agent</h2>
      <label for="agent-name">Name</label>
      <input type="text" id="agent-name" placeholder="My Agent">
      <label for="agent-role">Role</label>
      <select id="agent-role">
        <option value="neutral">Neutral (general-purpose)</option>
        <option value="researcher">Researcher</option>
        <option value="coder">Coder</option>
        <option value="writer">Writer</option>
        <option value="planner">Planner</option>
        <option value="reviewer">Reviewer</option>
      </select>
      <label for="agent-visibility">Visibility</label>
      <select id="agent-visibility">
        <option value="private">Private (hidden from other agents)</option>
        <option value="visible">Visible (can send/receive messages)</option>
        <option value="open">Open (visible + shared artifacts)</option>
      </select>
      <div class="modal-actions">
        <button class="btn-secondary" id="btn-create-cancel">Cancel</button>
        <button class="btn-primary" id="btn-create-confirm">Create</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/sidepanel.ts"></script>
</body>
</html>
