<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Central node (brain/agent) -->
  <circle cx="64" cy="54" r="16" fill="none" stroke="white" stroke-width="4"/>
  <circle cx="64" cy="54" r="6" fill="white"/>
  <!-- Connection lines radiating out -->
  <line x1="64" y1="70" x2="64" y2="90" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="48" y1="54" x2="30" y2="54" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="80" y1="54" x2="98" y2="54" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="42" x2="38" y2="28" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="76" y1="42" x2="90" y2="28" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Outer nodes (sub-agents/channels) -->
  <circle cx="64" cy="96" r="7" fill="white" opacity="0.9"/>
  <circle cx="24" cy="54" r="7" fill="white" opacity="0.9"/>
  <circle cx="104" cy="54" r="7" fill="white" opacity="0.9"/>
  <circle cx="34" cy="24" r="6" fill="white" opacity="0.7"/>
  <circle cx="94" cy="24" r="6" fill="white" opacity="0.7"/>
  <!-- Sparkle accent -->
  <path d="M98 82l2 6 6 2-6 2-2 6-2-6-6-2 6-2z" fill="white" opacity="0.6"/>
</svg>
