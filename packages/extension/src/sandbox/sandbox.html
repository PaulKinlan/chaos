<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <title>Sandboxed Content</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: #e1e4e8;
      background: #0d1117;
      padding: 16px;
      overflow-wrap: break-word;
      overflow-y: auto;
    }
    a { color: #8b9cf6; }
    pre { background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 12px; overflow-x: auto; margin: 8px 0; font-size: 13px; }
    code { font-family: "SF Mono", Monaco, "Cascadia Code", monospace; background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    pre code { background: transparent; padding: 0; border-radius: 0; }
    table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    th, td { border: 1px solid #30363d; padding: 8px 12px; text-align: left; }
    th { background: #161b22; font-weight: 600; color: #c9d1d9; }
    tr:nth-child(even) { background: rgba(22, 27, 34, 0.5); }
    h1, h2, h3, h4, h5, h6 { color: #c9d1d9; margin: 16px 0 8px 0; font-weight: 600; line-height: 1.3; }
    h1 { font-size: 1.5em; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
    h2 { font-size: 1.3em; }
    p { margin: 8px 0; }
    ul, ol { margin: 8px 0; padding-left: 24px; }
    li { margin: 4px 0; }
    blockquote { border-left: 3px solid #30363d; margin: 8px 0; padding: 4px 16px; color: #8b949e; }
    hr { border: none; border-top: 1px solid #30363d; margin: 16px 0; }
    img { max-width: 100%; }
    button { cursor: pointer; }
    strong, b { font-weight: 600; }
    #content { padding: 0; }
  </style>
</head>
<body>
  <div id="content"></div>
  <script>
    var contentEl = document.getElementById('content');

    function notifyComplete(messageId) {
      window.parent.postMessage({
        type: 'RENDER_COMPLETE',
        messageId: messageId,
        height: document.body.scrollHeight
      }, '*');
    }

    window.addEventListener('message', function(event) {
      var data = event.data;
      if (!data || typeof data !== 'object') return;

      if (data.type === 'RENDER_CONTENT' && contentEl) {
        contentEl.innerHTML = data.content || '';
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            notifyComplete(data.messageId);
          });
        });
      }
      else if (data.type === 'RENDER_INTERACTIVE' && contentEl) {
        contentEl.innerHTML = data.content || '';
        // Schedule completion before scripts (resilient to script errors)
        setTimeout(function() { notifyComplete(data.messageId); }, 100);
        // Execute scripts passed separately
        if (data.scripts && Array.isArray(data.scripts)) {
          for (var i = 0; i < data.scripts.length; i++) {
            try {
              var el = document.createElement('script');
              el.textContent = data.scripts[i];
              document.body.appendChild(el);
            } catch(e) {
              console.error('Script execution error:', e);
            }
          }
        }
      }
      else if (data.type === 'CLEAR_CONTENT' && contentEl) {
        contentEl.innerHTML = '';
      }
      else if (data.type === 'GET_HEIGHT') {
        window.parent.postMessage({
          type: 'HEIGHT_RESPONSE',
          messageId: data.messageId,
          height: document.body.scrollHeight
        }, '*');
      }
      else if (data.type === 'SET_THEME') {
        if (data.theme === null) {
          document.documentElement.removeAttribute('data-theme');
        } else {
          document.documentElement.setAttribute('data-theme', data.theme);
        }
      }
    });

    // Report ready
    window.parent.postMessage({ type: 'SANDBOX_READY' }, '*');
  </script>
</body>
</html>
