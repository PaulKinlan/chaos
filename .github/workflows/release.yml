name: Release Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version calculation

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: packages/extension

      - name: Unit tests
        run: npm test
        working-directory: packages/extension

      - name: Bump patch version and compute release version
        id: version
        run: |
          # Auto-bump patch version
          node scripts/bump-version.mjs patch
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION} (${SHORT_SHA})"

          # Update manifest version_name with SHA
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('packages/extension/manifest.json', 'utf8'));
            manifest.version_name = manifest.version + ' (${SHORT_SHA})';
            fs.writeFileSync('packages/extension/manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          "

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]" || true
          git push || true

      - name: Build extension
        run: npm run build
        working-directory: packages/extension

      - name: Package extension zip
        run: |
          cd packages/extension/dist
          zip -r ../../../chaos-extension-${{ steps.version.outputs.version }}.zip .
          cd ../../..
          ls -la chaos-extension-*.zip

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGES=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -30)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges -20)
          fi
          # Write to file to handle multiline
          echo "$CHANGES" > /tmp/changelog.txt
          echo "Generated changelog with $(echo "$CHANGES" | wc -l) entries"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "CHAOS Extension ${{ steps.version.outputs.version }}"
          body_path: /tmp/changelog.txt
          files: chaos-extension-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
