name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  extension-tests:
    name: Extension Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: packages/extension

      - name: Unit tests
        run: npm test
        working-directory: packages/extension

      - name: Build
        run: npm run build
        working-directory: packages/extension

  server-tests:
    name: Relay Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno fmt --check packages/server/src/

      - name: Type check
        run: deno check packages/server/src/main.ts

      - name: Unit tests
        run: deno task test
        working-directory: packages/server

      - name: Start server for conformance tests
        run: CHAOS_ADMIN_KEY=test deno run --allow-net --allow-env --unstable-kv packages/server/src/main.ts &
        env:
          PORT: 8787

      - name: Wait for server
        run: sleep 3

      - name: Conformance tests
        run: deno task test:conformance
        working-directory: packages/server
        env:
          RELAY_URL: http://localhost:8787
